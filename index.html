<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>License Contamination Scanner</title>
<style>
  /* ---------------------------------------------------------------------
     All styling lives here. No build step, no frameworks — this file runs
     by double-clicking it. That is deliberate: it must work in a live demo
     with zero setup.
  --------------------------------------------------------------------- */
  :root{
    --bg:#0b0f17; --panel:#121826; --ink:#e6edf6; --muted:#8a97ad;
    --green:#22c55e; --green-dim:#15351f;
    --red:#ef4444;   --red-dim:#3a1414;
    --root:#3b82f6;  --root-dim:#10243f;
    --line:#2a3346;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  header{padding:20px 24px 8px;}
  h1{margin:0; font-size:20px; letter-spacing:.2px;}
  .sub{color:var(--muted); font-size:13px; margin-top:4px;}
  .head-row{display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap;}
  /* the Gatsby example — clearly visible accent button, the headline demo */
  .example-cta{
    background:rgba(34,197,94,.12); color:#86efac; border:1px solid var(--green);
    padding:10px 16px; border-radius:8px; font-weight:600; font-size:14px;
    cursor:pointer; white-space:nowrap; flex:none;
  }
  .example-cta:hover{background:var(--green); color:#04210f;}
  /* "Back to normal" state — neutral, reads as a return action */
  .example-cta.is-back{background:rgba(138,151,173,.12); color:var(--ink); border-color:var(--line);}
  .example-cta.is-back:hover{background:var(--line); color:#fff;}
  .controls-hint{color:var(--muted); font-size:12px;}
  input::placeholder{color:#5b6577;}

  .controls{
    display:flex; gap:10px; align-items:center; flex-wrap:wrap;
    padding:12px 24px;
  }
  .controls input[type=text]{
    background:var(--panel); border:1px solid var(--line); color:var(--ink);
    padding:10px 12px; border-radius:8px; font-size:14px; min-width:180px;
  }
  button{
    background:var(--root); color:#fff; border:0; padding:10px 16px;
    border-radius:8px; font-size:14px; font-weight:600; cursor:pointer;
  }
  button:disabled{opacity:.6; cursor:default;}
  /* Demo-only toggle — subtle caption above the graph, not a header control */
  .demo-toggle{
    display:flex; gap:7px; align-items:center; flex-wrap:wrap;
    margin:0 24px 6px; padding:7px 12px; width:fit-content; max-width:calc(100% - 48px);
    background:rgba(37,99,235,.06); border:1px dashed var(--line);
    border-radius:8px; font-size:12.5px; color:var(--muted);
  }
  .demo-toggle .dot{width:7px;height:7px;border-radius:50%;background:var(--root);
    box-shadow:0 0 0 3px rgba(37,99,235,.18);}
  .demo-toggle .lead{color:var(--ink); font-weight:600;}
  .demo-toggle code{background:var(--bg); padding:1px 5px; border-radius:4px; color:var(--ink);}
  .demo-toggle select{
    background:var(--bg); color:var(--ink); border:1px solid var(--line);
    border-radius:6px; padding:3px 6px; font-size:12.5px;
  }
  .demo-toggle .hint{opacity:.85;}

  /* Verdict banner -------------------------------------------------- */
  .banner{
    margin:8px 24px; padding:14px 16px; border-radius:10px;
    font-size:15px; line-height:1.45; border:1px solid transparent;
    transition:background .25s, border-color .25s;
  }
  .banner.contaminated{background:var(--red-dim); border-color:var(--red); }
  .banner.clean{background:var(--green-dim); border-color:var(--green); }
  .banner .path{
    display:block; margin-top:8px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-size:12.5px; color:var(--ink); opacity:.9; word-break:break-word;
  }
  .banner .src{display:block;margin-top:6px;font-size:11px;color:var(--muted)}

  /* Staged Prometheux progress — makes the ~20s wait feel like visible work */
  .stages{margin-top:10px; display:flex; flex-direction:column; gap:6px;}
  .stage{font-size:13px; color:var(--muted); font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    transition:color .2s;}
  .stage.active{color:var(--ink);}
  .stage.done{color:var(--green);}
  .stage .dots::after{content:""; animation:dots 1.2s steps(4,end) infinite;}

  /* Sources (Tavily citations) ------------------------------------- */
  .sources{margin:8px 24px; padding:14px 16px; border-radius:10px;
    background:var(--panel); border:1px solid var(--line);}
  .sources .srcs-title{font-size:13px; font-weight:700; letter-spacing:.3px;
    text-transform:uppercase; color:var(--muted); margin-bottom:10px;}
  .sources .srcs-loading{font-size:14px; color:var(--ink);}
  .sources .srcs-loading .dots::after{content:""; animation:dots 1.2s steps(4,end) infinite;}
  @keyframes dots{0%{content:""}25%{content:"."}50%{content:".."}75%{content:"..."}100%{content:""}}
  .sources .srcs-error{font-size:13px; color:#fca5a5; line-height:1.5;}
  .sources .srcs-error code{background:#0b0f17;padding:2px 6px;border-radius:4px;}
  .sources ol{margin:0; padding-left:20px;}
  .sources li{margin:8px 0; font-size:14px;}
  .sources li .lbl{color:var(--ink); font-weight:600;}
  .sources li a{color:var(--root); text-decoration:none; word-break:break-all;}
  .sources li a:hover{text-decoration:underline;}
  .sources li .missing{color:var(--muted); font-style:italic;}

  /* Cited report panel (paywalled) -------------------------------- */
  .sources .rep-title{font-size:13px; font-weight:700; letter-spacing:.3px;
    text-transform:uppercase; color:var(--muted); margin-bottom:10px;}
  .rep-badge{color:var(--green); font-weight:600; text-transform:none; letter-spacing:0; margin-left:8px;}
  .rep-lockline{font-size:14px; color:var(--ink); font-weight:600;}
  .rep-teaser{font-size:13px; color:var(--muted); margin:8px 0 12px; line-height:1.5;}
  .rep-actions{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
  .rep-unlock{background:var(--root); color:#fff; border:0; padding:9px 16px;
    border-radius:8px; font-size:14px; font-weight:600; cursor:pointer;}
  .rep-unlock:hover{filter:brightness(1.1);}
  .rep-pay{background:transparent; color:var(--muted); border:1px dashed var(--line);
    padding:9px 14px; border-radius:8px; font-size:13px; cursor:not-allowed;}
  .rep-prompt{display:flex; gap:8px; align-items:center; margin-top:12px; flex-wrap:wrap;}
  .rep-prompt input{background:var(--bg); border:1px solid var(--line); color:var(--ink);
    padding:8px 10px; border-radius:6px; font-size:13px;}
  .rep-prompt button{background:var(--green); color:#04210f; border:0; padding:8px 14px;
    border-radius:6px; font-weight:600; cursor:pointer;}
  .rep-msg{font-size:12px; color:var(--muted);}
  .rep-msg.err{color:#fca5a5;}
  .rep-body{font-size:14px; line-height:1.6; color:var(--ink);}
  .rep-body h2{font-size:18px; margin:4px 0 12px;}
  .rep-body h3{font-size:12px; text-transform:uppercase; letter-spacing:.3px;
    color:var(--muted); margin:16px 0 6px;}
  .rep-body ul{margin:6px 0; padding-left:20px;}
  .rep-body li{margin:6px 0; word-break:break-word;}
  .rep-body a{color:var(--root); text-decoration:none; word-break:break-all;}
  .rep-body a:hover{text-decoration:underline;}
  .rep-body code{background:var(--bg); padding:1px 5px; border-radius:4px;}
  .rep-body p{margin:8px 0;}

  /* Graph ----------------------------------------------------------- */
  .graphwrap{overflow:auto; padding:8px 24px 24px;}
  svg{display:block;}

  .edge{stroke:var(--line); stroke-width:2; fill:none;}
  .edge.path{stroke:var(--red); stroke-width:3;}

  .node rect{stroke-width:2; rx:9; }
  .node text{font-size:12px; fill:var(--ink); }
  .node .lic{font-size:10px; fill:var(--muted);}

  .node.permissive rect{fill:var(--green-dim); stroke:var(--green);}
  .node.copyleft   rect{fill:var(--red-dim);   stroke:var(--red);}
  .node.root       rect{fill:var(--root-dim);  stroke:var(--root); stroke-width:3;}
  .node.unknown    rect{fill:#1c2230;          stroke:#5b6577;}

  /* highlight + animation for the contaminated path */
  .node.onpath rect{filter:drop-shadow(0 0 8px var(--red)); animation:pulse 1.1s ease-in-out infinite;}
  @keyframes pulse{0%,100%{filter:drop-shadow(0 0 4px var(--red));}50%{filter:drop-shadow(0 0 14px var(--red));}}

  .edge.path.animate{stroke-dasharray:var(--len); stroke-dashoffset:var(--len);
    animation:draw .55s ease forwards;}
  @keyframes draw{to{stroke-dashoffset:0;}}

  .legend{display:flex;gap:16px;flex-wrap:wrap;padding:0 24px 20px;color:var(--muted);font-size:12px}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .swatch{width:12px;height:12px;border-radius:3px;border:2px solid}
  .sw-green{background:var(--green-dim);border-color:var(--green)}
  .sw-red{background:var(--red-dim);border-color:var(--red)}
  .sw-root{background:var(--root-dim);border-color:var(--root)}
</style>
</head>
<body>
  <header>
    <div class="head-row">
      <div class="head-left">
        <h1>License Contamination Scanner</h1>
        <div class="sub">Detect hidden GPL/copyleft contamination in a dependency tree and prove the exact path.</div>
      </div>
      <!-- The main demo, kept prominent and one click away. -->
      <button id="exampleBtn" class="example-cta">▶&nbsp; Example: Gatsby case</button>
    </div>
  </header>

  <div class="controls">
    <input id="rootInput" type="text" spellcheck="false"
           placeholder="Enter an npm package name — e.g. express, eslint, react" />
    <button id="scanBtn">Scan</button>
    <span class="controls-hint">Scans live via deps.dev</span>
  </div>

  <div id="banner" class="banner clean">Loading…</div>

  <!-- Paywalled cited-report panel: shows a locked state on contamination;
       the full cited.md is revealed via /api/unlock (dev password / x402). -->
  <div id="sources" class="sources" style="display:none"></div>

  <div class="legend">
    <span><i class="swatch sw-root"></i> root package</span>
    <span><i class="swatch sw-green"></i> permissive (MIT / ISC / Apache)</span>
    <span><i class="swatch sw-red"></i> GPL / copyleft</span>
  </div>

  <!-- Demo-only interaction: appears only in the Gatsby demo view (hidden in
       live npm mode). Flipping smartwrap's license re-derives contamination
       live — the "proof it's reasoning, not a lookup" moment. -->
  <div id="demoToggle" class="demo-toggle">
    <span class="dot"></span>
    <span class="lead">Try it live —</span>
    <span>flip <code>smartwrap</code>'s license</span>
    <select id="smartwrapLicense" aria-label="smartwrap license">
      <option value="GPL-2.0" selected>GPL-2.0</option>
      <option value="MIT">MIT</option>
    </select>
    <span class="hint">and watch the verdict re-derive.</span>
  </div>

  <div class="graphwrap"><svg id="graph"></svg></div>

<script>
/* =======================================================================
   1. EMBEDDED DATA
   These strings mirror packages.csv and dependencies.csv exactly. We embed
   them (instead of fetch()) because fetching local files fails on file://
   in Chrome — embedding guarantees the demo always runs. To load the real
   CSV files later, replace these constants with a fetch() + the same
   parseCSV() below.
======================================================================= */
const PACKAGES_CSV = `name,license
gatsby,MIT
gatsby-recipes,MIT
graphql-tools-schema,MIT
value-or-promise,MIT
graphql-compose,MIT
react-dev-utils,MIT
chalk,MIT
ansi-styles,MIT
date-fns,MIT
semver,ISC
micromatch,MIT
to-readable-stream,MIT
smartwrap,GPL-2.0`;

const DEPENDENCIES_CSV = `parent,child
gatsby,gatsby-recipes
gatsby,react-dev-utils
gatsby,date-fns
gatsby-recipes,graphql-tools-schema
gatsby-recipes,micromatch
graphql-tools-schema,value-or-promise
graphql-tools-schema,graphql-compose
value-or-promise,to-readable-stream
to-readable-stream,smartwrap
react-dev-utils,chalk
chalk,ansi-styles
date-fns,semver`;

/* Tiny CSV parser — assumes no quoted commas (our data has none). */
function parseCSV(text){
  const [head, ...rows] = text.trim().split(/\r?\n/);
  const cols = head.split(",");
  return rows.map(line=>{
    const cells = line.split(",");
    const obj = {};
    cols.forEach((c,i)=> obj[c] = cells[i]);
    return obj;
  });
}

/* -----------------------------------------------------------------------
   GRAPH STATE — rebuildable so we can load EITHER the embedded gatsby demo
   OR a live npm scan into the same UI. setGraph() repopulates everything
   and recomputes the layout; rootName tracks which node is the root.
----------------------------------------------------------------------- */
let licenses = {};   // name -> license string (smartwrap toggle edits this)
let edges    = [];   // [{parent, child}]
let children = {};   // parent -> [children]
let rootName = "gatsby";
let truncationNote = null;   // text shown when a live tree was capped

function setGraph(pkgs, deps, root){
  licenses = {};
  pkgs.forEach(p=> licenses[p.name] = p.license || "unknown");
  edges = deps.map(d=>({parent:d.parent, child:d.child}));
  children = {};
  edges.forEach(({parent,child})=>{ (children[parent] ||= []).push(child); });
  rootName = root;
  computeLayout(root);
}

/* the embedded demo data, kept so the smartwrap toggle can restore it */
const DEMO_PACKAGES = parseCSV(PACKAGES_CSV).map(p=>({name:p.name, license:p.license}));
const DEMO_DEPS     = parseCSV(DEPENDENCIES_CSV).map(d=>({parent:d.parent, child:d.child}));
function loadDemoGraph(){ truncationNote=null; setGraph(DEMO_PACKAGES, DEMO_DEPS, "gatsby"); }

// License hints for coloring nodes when we render Prometheux results directly
// (the concept returns package names + paths, not licenses). Covers the demo
// (gatsby) and the sample (PaySwift) datasets.
const SAMPLE_PACKAGES = [
  {name:"PaySwift",license:"Proprietary"}, {name:"web-core",license:"MIT"},
  {name:"auth-kit",license:"MIT"}, {name:"data-layer",license:"Apache-2.0"},
  {name:"http-engine",license:"MIT"}, {name:"stream-parser",license:"MIT"},
  {name:"fast-xml",license:"GPL-3.0"}, {name:"token-utils",license:"MIT"},
];
const LICENSE_HINTS = {};
[...DEMO_PACKAGES, ...SAMPLE_PACKAGES].forEach(p=> LICENSE_HINTS[p.name] = p.license);

/* A license is "copyleft" if it mentions GPL (covers GPL/AGPL/LGPL). */
function isCopyleft(license){ return /GPL/i.test(license || ""); }

/* =======================================================================
   2. THE STUB  ←←←  REPLACE THIS WITH THE REAL PROMETHEUX API CALL LATER
   -----------------------------------------------------------------------
   Right now it returns the KNOWN result for gatsby. It is async and shaped
   exactly like the live API response, so swapping it in is a one-function
   change:

       async function getContaminationResult(root){
         const res = await fetch(PMTX_API_URL, { ...send dependency data... });
         return await res.json();   // same { verdict, contaminated, path, reason }
       }

   Returned shape:
     { contaminated: boolean,
       path: [{ name, license }, ...],   // root -> ... -> copyleft pkg
       verdict: string,                  // plain-English banner text
       reason: string }
======================================================================= */
const KNOWN_GATSBY_RESULT = {
  contaminated: true,
  path: [
    {name:"gatsby",               license:"MIT"},
    {name:"gatsby-recipes",       license:"MIT"},
    {name:"graphql-tools-schema", license:"MIT"},
    {name:"value-or-promise",     license:"MIT"},
    {name:"to-readable-stream",   license:"MIT"},
    {name:"smartwrap",            license:"GPL-2.0"},
  ],
  verdict:"⚠️ gatsby is legally exposed — a GPL-2.0 dependency (smartwrap) is reachable via this path.",
  reason:"A copyleft (GPL-2.0) package is reachable from the MIT-licensed root.",
};

async function getContaminationResult(root){
  // Simulate the network round-trip so the loading state is visible in demos.
  await new Promise(r=>setTimeout(r, 550));
  // STUB: hardcoded known answer for gatsby. (Real API would compute this.)
  if(root === "gatsby") return structuredClone(KNOWN_GATSBY_RESULT);
  // Graceful fallback for any other input until the API is wired:
  return deriveContamination(root);
}

/* =======================================================================
   3. LOCAL CONTAMINATION ENGINE (powers the live smartwrap toggle)
   Walks the embedded tree from `root` and returns the first path that
   reaches a copyleft package. Same return shape as the stub above.
======================================================================= */
function deriveContamination(root){
  let found = null;
  const seen = new Set();   // cycle guard — npm graphs are DAGs with cycles
  (function dfs(node, trail){
    if(found || seen.has(node)) return;
    seen.add(node);
    const trail2 = [...trail, node];
    if(node !== root && isCopyleft(licenses[node])){ found = trail2; return; }
    for(const c of (children[node] || [])) dfs(c, trail2);
  })(root, []);

  if(!found){
    return {
      contaminated:false, path:[],
      verdict:`✅ ${root} is clean — no GPL/copyleft dependency is reachable.`,
      reason:"Every reachable dependency uses a permissive license.",
    };
  }
  const last = found[found.length-1];
  return {
    contaminated:true,
    path: found.map(n=>({name:n, license:licenses[n]})),
    verdict:`⚠️ ${root} is legally exposed — a ${licenses[last]} dependency (${last}) is reachable via this path.`,
    reason:`A copyleft (${licenses[last]}) package is reachable from the ${licenses[root]}-licensed root.`,
  };
}

/* =======================================================================
   4. GRAPH LAYOUT — BFS-layered, robust to cycles and multi-parent nodes.
   Each node's row = its shortest-hop distance from the root; nodes on the
   same row are spread horizontally. For the gatsby tree this matches the
   old tree layout; for real npm DAGs it stays sane. Recomputed by setGraph.
======================================================================= */
const H_GAP = 175, V_GAP = 110, NODE_H = 46, PAD = 40;
let pos = {};   // name -> {x,y,depth}

function computeLayout(root){
  pos = {};
  // BFS to assign each node a depth (shortest hops from root)
  const depth = { [root]: 0 };
  const queue = [root];
  const seen = new Set([root]);
  while(queue.length){
    const u = queue.shift();
    for(const c of (children[u] || [])){
      if(!seen.has(c)){ seen.add(c); depth[c] = depth[u] + 1; queue.push(c); }
    }
  }
  // any node never reached from root (shouldn't happen, but be safe) -> last row
  let maxDepth = 0;
  Object.keys(licenses).forEach(n=>{
    if(depth[n] === undefined) depth[n] = (maxDepth || 0) + 1;
    maxDepth = Math.max(maxDepth, depth[n]);
  });
  // group by depth, then spread each row horizontally
  const rows = {};
  Object.keys(depth).forEach(n=>{ (rows[depth[n]] ||= []).push(n); });
  Object.keys(rows).forEach(d=>{
    rows[d].forEach((n, i)=>{
      pos[n] = { x: i * H_GAP + PAD + 80, y: (+d) * V_GAP + PAD, depth: +d };
    });
  });
}

function nodeWidth(name){ return Math.max(104, name.length*7.4 + 26); }

// initialise with the embedded gatsby demo so the page renders on first paint
loadDemoGraph();

/* =======================================================================
   5. RENDER
======================================================================= */
const svg    = document.getElementById("graph");
const banner = document.getElementById("banner");

function classFor(name){
  if(name === rootName) return "root";
  if(licenses[name] === "unknown" || licenses[name] === undefined) return "unknown";
  return isCopyleft(licenses[name]) ? "copyleft" : "permissive";
}

function render(result){
  // ---- banner ----
  banner.className = "banner " + (result.contaminated ? "contaminated" : "clean");
  const pathText = result.contaminated
    ? result.path.map(p=>`${p.name} (${p.license})`).join("  →  ")
    : "";
  const srcLabel = result.__pmtx     ? `✓ Reasoned live by Prometheux (${(result.__elapsed/1000).toFixed(1)}s)`
                 : result.__bigtree  ? `⚡ Fast JS scan · Prometheux skipped for this ${result.__bigtree}-package tree (demo speed)`
                 : result.__fallback ? "Reasoning (engine warming up)"
                 : result.__live     ? "live re-derive (embedded data)"
                 :                      "Prometheux API (stubbed)";
  banner.innerHTML =
    `<strong>${result.verdict}</strong>` +
    (pathText ? `<span class="path">${pathText}</span>` : "") +
    (truncationNote ? `<span class="src">⚠ ${truncationNote}</span>` : "") +
    `<span class="src">Source: ${srcLabel}</span>`;

  // sets for highlighting
  const onPath = new Set(result.path.map(p=>p.name));
  const pathEdges = new Set();
  for(let i=0;i<result.path.length-1;i++){
    pathEdges.add(result.path[i].name + "→" + result.path[i+1].name);
  }

  // ---- svg bounds ----
  let maxX=0, maxY=0;
  Object.entries(pos).forEach(([n,p])=>{
    maxX = Math.max(maxX, p.x + nodeWidth(n)/2);
    maxY = Math.max(maxY, p.y + NODE_H);
  });
  svg.setAttribute("width",  maxX + PAD);
  svg.setAttribute("height", maxY + PAD);

  // ---- build edges ----
  let edgeHTML = "";
  edges.forEach(({parent,child})=>{
    const a = pos[parent], b = pos[child];
    const x1=a.x, y1=a.y+NODE_H, x2=b.x, y2=b.y;
    const my=(y1+y2)/2;
    const d=`M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`;
    const isPath = pathEdges.has(parent+"→"+child);
    edgeHTML += `<path class="edge${isPath?' path':''}" data-pathedge="${isPath}" d="${d}"></path>`;
  });

  // ---- build nodes ----
  let nodeHTML = "";
  Object.keys(pos).forEach(name=>{
    const p = pos[name], w = nodeWidth(name);
    const cls = classFor(name) + (onPath.has(name) ? " onpath" : "");
    const rootTag = name===rootName ? `<text class="lic" x="${p.x}" y="${p.y-6}" text-anchor="middle">ROOT</text>` : "";
    nodeHTML += `
      <g class="node ${cls}">
        ${rootTag}
        <rect x="${p.x-w/2}" y="${p.y}" width="${w}" height="${NODE_H}" rx="9"></rect>
        <text x="${p.x}" y="${p.y+20}" text-anchor="middle">${name}</text>
        <text class="lic" x="${p.x}" y="${p.y+36}" text-anchor="middle">${licenses[name]}</text>
      </g>`;
  });

  svg.innerHTML = edgeHTML + nodeHTML;

  // ---- animate the contaminated path edges sequentially ----
  if(result.contaminated){
    const paths = svg.querySelectorAll('path[data-pathedge="true"]');
    paths.forEach((el, i)=>{
      const len = el.getTotalLength();
      el.style.setProperty("--len", len);
      el.style.animationDelay = (i*0.45) + "s";
      // force reflow so the animation restarts on every render
      void el.getBoundingClientRect();
      el.classList.add("animate");
    });
  }
}

/* =======================================================================
   5b. CITED REPORT — paywalled.
   On a contaminated scan the backend runs Tavily + writes cited.md, but the
   report content stays server-side. The browser only learns it's READY and
   shows a locked panel; the full cited report is revealed via /api/unlock
   (dev password) — or, later, an agent payment (x402). Free: graph + verdict
   + path. Locked: the full cited.md (why-it-matters + sources).
======================================================================= */
const sourcesBox = document.getElementById("sources");   // the cited-report panel

// minimal markdown -> HTML for the fixed cited.md format
function mdToHtml(md){
  const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const inline = s => esc(s)
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, (m,t,u)=>`<a href="${u.replace(/"/g,"&quot;")}" target="_blank" rel="noopener">${t}</a>`)
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  const out = []; let inList = false;
  const closeList = ()=>{ if(inList){ out.push("</ul>"); inList = false; } };
  md.split(/\r?\n/).forEach(ln=>{
    if(/^### /.test(ln)){ closeList(); out.push("<h4>"+inline(ln.slice(4))+"</h4>"); }
    else if(/^## /.test(ln)){ closeList(); out.push("<h3>"+inline(ln.slice(3))+"</h3>"); }
    else if(/^# /.test(ln)){ closeList(); out.push("<h2>"+inline(ln.slice(2))+"</h2>"); }
    else if(/^- /.test(ln)){ if(!inList){ out.push("<ul>"); inList = true; } out.push("<li>"+inline(ln.slice(2))+"</li>"); }
    else if(ln.trim()===""){ closeList(); }
    else { closeList(); out.push("<p>"+inline(ln)+"</p>"); }
  });
  closeList();
  return out.join("\n");
}

async function doUnlock(password){
  const msg = sourcesBox.querySelector("#unlockMsg");
  if(msg){ msg.textContent = "checking…"; msg.className = "rep-msg"; }
  try{
    const res = await fetch("/api/unlock", {
      method:"POST", headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ password }),
    });
    const data = await res.json();
    if(!data.ok) throw new Error(data.error || "Incorrect password");
    showReportUnlocked(data.report);
  }catch(err){
    if(msg){ msg.textContent = err.message; msg.className = "rep-msg err"; }
  }
}

function showReportUnlocked(report){
  sourcesBox.style.display = "block";
  sourcesBox.innerHTML =

/* =======================================================================
   6. WIRING
======================================================================= */
const exampleBtn = document.getElementById("exampleBtn");
const scanBtn    = document.getElementById("scanBtn");
const rootInput  = document.getElementById("rootInput");
const swSelect   = document.getElementById("smartwrapLicense");
const demoToggle = document.getElementById("demoToggle");

// the toggle only belongs to the Gatsby demo view
function showDemoToggle(show){ demoToggle.style.display = show ? "flex" : "none"; }

// ARM the example: set up the Gatsby view (gatsby in the search bar, demo
// mode) but DON'T run the analysis — nothing is revealed until Scan is clicked.
function armExample(){
  loadDemoGraph();                  // the embedded gatsby tree (pristine demo)
  rootInput.value = "gatsby";       // reflect it in the search bar
  swSelect.value = "GPL-2.0";
  licenses["smartwrap"] = "GPL-2.0";
  showDemoToggle(false);            // toggle appears only after running
  sourcesBox.style.display = "none";
  setExampleButton(true);           // offer "Back to normal"
  banner.className = "banner clean";
  banner.innerHTML =
    `<strong>Gatsby example ready.</strong>` +
    `<span class="src">Click <em>Scan</em> to trace the contamination path.</span>`;
  svg.innerHTML = ""; svg.setAttribute("width", 0); svg.setAttribute("height", 0);

// ---- staged progress animation — makes a wait feel like deliberate work ----
// Generic engine: a title, the stage labels, and the elapsed-seconds
// thresholds at which to advance. Used by both the live Prometheux example
// (slow, ~20s) and the fast deps.dev scan (sub-second thresholds).
const PMTX_STAGES = [
  "Sending dependency graph to Prometheux",
  "Running recursive reachability",
  "Tracing contamination paths",
];
let stageTimer = null;
function startStages(title, stages, advanceAt){
  const t0 = Date.now();
  function paint(){
    const e = (Date.now()-t0)/1000;
    const secs = Math.floor(e);
    let at = 0; advanceAt.forEach((th,i)=>{ if(e > th) at = i + 1; });
    at = Math.min(at, stages.length - 1);
    const items = stages.map((s,i)=>
      i <  at ? `<div class="stage done">✓ ${s}</div>` :
      i === at ? `<div class="stage active">▸ ${s}<span class="dots"></span></div>` :
                 `<div class="stage">• ${s}</div>`
    ).join("");
    banner.className = "banner clean";
    banner.innerHTML = `<strong>${title} ${secs}s</strong><div class="stages">${items}</div>`;
  }
  paint();
  stageTimer = setInterval(paint, 400);
}
function stopStagedProgress(){ if(stageTimer){ clearInterval(stageTimer); stageTimer = null; } }

// ---- call our server (which calls Prometheux), with an abort timeout -------
// POST our dependency graph; the server uploads it as CSVs and runs the
// contaminated_path2 concept over it. Returns {ok, rows, elapsedMs}.
async function fetchPrometheux(payload){
  // TEST HOOK: add ?forcefallback=1 to the URL to force the JS fallback path
  // (rehearse the demo when compute is down). Inert without the flag — nothing
  // to revert, just drop the query param.
  if(new URLSearchParams(location.search).has("forcefallback")){
    throw new Error("forced fallback (test mode)");
  }
  const ctrl = new AbortController();
  const to = setTimeout(()=>ctrl.abort(), 25000);   // 25s cap → auto-fallback to JS
  try{
    const res = await fetch("/api/prometheux-run", {
      method:"POST", headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(payload), signal: ctrl.signal,
    });
    return await res.json();
  }finally{ clearTimeout(to); }
}

// the current graph as an upload payload (reflects the smartwrap toggle, etc.)
function currentGraphPayload(){
  return {
    packages: Object.keys(licenses).map(n=>({ name:n, license:licenses[n] })),
    dependencies: edges.map(e=>({ parent:e.parent, child:e.child })),
  };
}

// ---- turn the Prometheux resultSet into the UI's result shape -------------
// Rows are [Package, CopyleftPkg, Path]; the longest Path is root→copyleft.
function buildResultFromPrometheux(data){
  const rows = data.rows;
  const splitPath = s => s.split(/\s*->\s*/).filter(Boolean);
  // longest path = the full chain from the root down to the copyleft package
  let longest = [];
  rows.forEach(r=>{ const p = splitPath(r[2]); if(p.length > longest.length) longest = p; });
  const copyleftPkg = rows[0][1];

  // do the returned nodes already exist in the displayed (embedded) graph?
  const allKnown = longest.every(n => licenses[n] !== undefined);

  if(!allKnown){
    // reconstruct the graph straight from the returned paths (e.g. sample data)
    const edgeSet = new Set(), nodes = new Set();
    rows.forEach(r=>{
      const p = splitPath(r[2]);
      p.forEach(n=> nodes.add(n));
      for(let i=0;i<p.length-1;i++) edgeSet.add(p[i] + ">" + p[i+1]);
    });
    const packages = [...nodes].map(n=>({ name:n, license: LICENSE_HINTS[n] || "unknown" }));
    const dependencies = [...edgeSet].map(k=>{ const [parent,child]=k.split(">"); return {parent,child}; });
    setGraph(packages, dependencies, longest[0]);
  }
  const licOf = n => licenses[n] || LICENSE_HINTS[n] || "unknown";
  const last = longest[longest.length-1];
  return {
    contaminated: true,
    path: longest.map(n=>({ name:n, license: licOf(n) })),
    verdict: `⚠️ ${longest[0]} is legally exposed — a ${licOf(copyleftPkg)} dependency ` +
             `(${copyleftPkg}) is reachable via this path.`,
    reason: `Prometheux proved a copyleft (${licOf(copyleftPkg)}) package is reachable from ${longest[0]}.`,
  };
}

// RUN the example LIVE through Prometheux. Falls back to the local engine if
// the API fails / times out / compute is asleep — the demo never hard-fails.
async function runExample(){
  exampleBtn.disabled = scanBtn.disabled = true;
  const orig = scanBtn.textContent;
  scanBtn.textContent = "Reasoning…";
  loadDemoGraph();                     // baseline embedded graph
  licenses["smartwrap"] = swSelect.value || "GPL-2.0";
  showDemoToggle(false);
  sourcesBox.style.display = "none";
  svg.innerHTML = ""; svg.setAttribute("width",0); svg.setAttribute("height",0);
  startStages("Reasoning live with Prometheux…", PMTX_STAGES, [3, 8]);

  let result, source;
  try{
    const data = await fetchPrometheux(currentGraphPayload());
    if(!data || !data.ok || !data.rows || !data.rows.length){
      throw new Error(data && data.error ? data.error : "no reasoning rows returned");
    }
    result = buildResultFromPrometheux(data);
    result.__pmtx = true;
    result.__elapsed = data.elapsedMs;
    source = "prometheux";
  }catch(err){
    // never hard-fail: fall back to the local reachability engine on gatsby
    console.warn("[contamination] Prometheux failed → local fallback:", err.message);
    loadDemoGraph();
    licenses["smartwrap"] = swSelect.value || "GPL-2.0";
    result = deriveContamination("gatsby");
    result.__fallback = true;
    source = "local-fallback";
  }finally{
    stopStagedProgress();
  }
  console.log("[contamination] source:", source);

  render(result);
  showDemoToggle("smartwrap" in licenses);   // toggle only when smartwrap is in view
  fetchSources();                            // Tavily citations alongside

  scanBtn.textContent = orig;
  exampleBtn.disabled = scanBtn.disabled = false;
}

// The header button is context-aware: it arms the example in the normal
// view, and becomes "← Back to normal" while the example is showing.
let inExample = false;
function setExampleButton(on){
  inExample = on;
  exampleBtn.innerHTML = on ? "←&nbsp; Back to normal" : "▶&nbsp; Example: Gatsby case";
  exampleBtn.classList.toggle("is-back", on);
}
exampleBtn.addEventListener("click", ()=>{ inExample ? showInitialState() : armExample(); });

/* -----------------------------------------------------------------------
   LIVE npm MODE — scans any real npm package via the server (/api/scan),
   which calls deps.dev. Loads the result into the SAME graph/verdict UI
   and runs the existing contamination logic over it.
----------------------------------------------------------------------- */
async function scanNpm(){
  const name = rootInput.value.trim();
  if(!name){
    rootInput.focus();
    banner.className = "banner contaminated";
    banner.innerHTML = `<strong>Enter an npm package name to scan.</strong>` +
      `<span class="src">Or click <em>Example: Gatsby case</em> (top right) for the demo.</span>`;
    return;
  }
  scanBtn.disabled = exampleBtn.disabled = true;
  const original = scanBtn.textContent;
  scanBtn.textContent = "Reasoning…";
  sourcesBox.style.display = "none";   // report panel hidden until contamination found
  showDemoToggle(false);               // not the Gatsby demo → hide the toggle
  setExampleButton(false);             // leaving the example → offer it again
  svg.innerHTML = ""; svg.setAttribute("width",0); svg.setAttribute("height",0);
  startStages("Reasoning live with Prometheux…", PMTX_STAGES, [3, 8]);

  try{
    const res = await fetch("/api/scan?package=" + encodeURIComponent(name));
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || ("HTTP " + res.status));

    // load the live tree into the shared graph state
    setGraph(data.packages, data.dependencies, data.root);
    truncationNote = data.truncated
      ? `tree truncated to ${data.shown} packages for display (of ${data.total}; copyleft packages were prioritised)`
      : null;

    let result = null;
    const bigTree = data.total > 80;   // GUARD: Prometheux only for small trees
    if(!bigTree){
      try{
        const pmtx = await fetchPrometheux({ packages: data.packages, dependencies: data.dependencies });
        if(pmtx && pmtx.ok){
          result = (pmtx.rows && pmtx.rows.length)
            ? buildResultFromPrometheux(pmtx)
            : { contaminated:false, path:[], verdict:"✅ No contamination found — clean tree" };
          result.__pmtx = true;
          result.__elapsed = pmtx.elapsedMs;
        }else{
          throw new Error(pmtx && pmtx.error ? pmtx.error : "no Prometheux result");
        }
      }catch(e){
        console.warn("[live] Prometheux failed → JS fallback:", e.message);
        result = null;
      }
    }
    if(!result){
      // JS reachability — never hard-fails.
      result = deriveContamination(data.root);
      if(!result.contaminated){ result.verdict = "✅ No contamination found — clean tree"; }
      if(bigTree) result.__bigtree = data.total;   // deliberate skip — could've used Prometheux
      else        result.__fallback = true;        // Prometheux tried but unavailable
    }
    console.log("[live] source:", result.__pmtx ? "prometheux" : (result.__bigtree ? "js (big tree)" : "js (fallback)"));

    stopStagedProgress();
    render(result);

    // contamination found → fetch real citations + write cited.md.
    // clean tree → nothing to cite, leave the report panel hidden.
    if(result.contaminated && result.path.length){
      const last = result.path[result.path.length - 1];   // the copyleft package
      const pathStr = result.path.map(p=>p.name).join(" -> ");
      fetchLiveSources(data.root, last.name, last.license, pathStr);
    }
  }catch(err){
    stopStagedProgress();
    truncationNote = null;
    banner.className = "banner contaminated";
    banner.innerHTML =
      `<strong>Couldn't scan “${name}”.</strong>` +
      `<span class="src">${err.message}. Try an exact npm package name (e.g. gatsby, express, eslint). ` +
      `Live mode needs the server running — open http://localhost:3000.</span>`;
  }finally{
    stopStagedProgress();
    scanBtn.textContent = original;
    scanBtn.disabled = exampleBtn.disabled = false;
  }
}
// Scan dispatch: while the example is armed and the box still says "gatsby",
// Scan RUNS the embedded example; otherwise it does a live deps.dev scan.
function onScan(){
  const name = rootInput.value.trim();
  if(inExample && name === "gatsby") return runExample();
  return scanNpm();
}
scanBtn.addEventListener("click", onScan);
rootInput.addEventListener("keydown", e=>{ if(e.key === "Enter") onScan(); });

// THE KICKER — live, instant, runs on embedded data (no API). Restores the
// gatsby demo graph first, so it works even after a live npm scan.
swSelect.addEventListener("change", ()=>{
  loadDemoGraph();                               // back to the embedded tree
  licenses["smartwrap"] = swSelect.value;        // mutate the data
  sourcesBox.style.display = "none";
  showDemoToggle(true);                          // still the demo view
  const result = deriveContamination("gatsby");  // recompute locally
  result.__live = true;                          // label the source
  render(result);
});

// the normal / empty starting state — no example preloaded. The Gatsby
// demo is one obvious click away via the "Example: Gatsby case" button.
function showInitialState(){
  rootInput.value = "";
  showDemoToggle(false);
  setExampleButton(false);   // normal view → button offers the example
  sourcesBox.style.display = "none";
  banner.className = "banner clean";
  banner.innerHTML =
    `<strong>Scan a package to trace its license contamination.</strong>` +
    `<span class="src">Type an npm package name and click Scan — or load the ` +
    `<em>Example: Gatsby case</em> (top right) for the demo.</span>`;
  svg.innerHTML = "";
  svg.setAttribute("width", 0);
  svg.setAttribute("height", 0);
}

// initial load: start in the normal state (NOT the example).
window.addEventListener("DOMContentLoaded", showInitialState);
